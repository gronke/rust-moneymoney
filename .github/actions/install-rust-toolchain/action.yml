name: Install Rust toolchain
description: >-
  Install Rust via rustup with optional components and put $CARGO_HOME/bin on
  PATH. Replaces dtolnay/rust-toolchain so we don't depend on third-party
  actions whose behaviour shifts with the runner image (see ci.yml).

inputs:
  toolchain:
    description: Toolchain to install (passed to --default-toolchain).
    required: false
    default: stable
  components:
    description: Space-separated rustup components to add (e.g. "rustfmt clippy").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install rustup and toolchain
      shell: bash
      env:
        TOOLCHAIN: ${{ inputs.toolchain }}
        COMPONENTS: ${{ inputs.components }}
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y \
              --default-toolchain "$TOOLCHAIN" \
              --profile minimal \
              --no-modify-path
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
        if [ -n "$COMPONENTS" ]; then
          # shellcheck disable=SC2086
          "$HOME/.cargo/bin/rustup" component add $COMPONENTS
        fi
        "$HOME/.cargo/bin/rustc" --version
        "$HOME/.cargo/bin/cargo" --version
