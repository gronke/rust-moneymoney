name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain

      - name: Cache cargo registry & git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-${{ runner.os }}-

      - name: Cache target/
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-check-
            cargo-target-${{ runner.os }}-

      - name: Check compilation
        run: cargo check --all-features

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain

      - name: Cache cargo registry & git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-${{ runner.os }}-

      - name: Cache target/
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-test-
            cargo-target-${{ runner.os }}-

      - name: Run unit tests
        run: cargo test --lib

      - name: Run doc tests
        run: cargo test --doc

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain
        with:
          components: clippy

      - name: Cache cargo registry & git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-${{ runner.os }}-

      - name: Cache target/
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-clippy-
            cargo-target-${{ runner.os }}-

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  doc:
    name: Documentation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain

      - name: Cache cargo registry & git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-deps-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-deps-${{ runner.os }}-

      - name: Cache target/
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-doc-
            cargo-target-${{ runner.os }}-

      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: ./.github/actions/install-rust-toolchain

      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
